<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allocations | ONYX MUN 2026</title>
    <meta name="description" content="Official diplomat and representative allocations for ONYX MUN 2026. Browse assignments for HCC, UNCSW, DISEC, UNHRC, and Lok Sabha. Search for specific representatives and countries.">
    <meta name="keywords" content="ONYX MUN Allocations, MUN Delegate List 2026, HCC Allocations, UNCSW Allocations, DISEC Countries, UNHRC Allocations, Lok Sabha Representatives">
    
    <!-- Geo / LLMEO Metadata -->
    <meta property="og:title" content="Allocations | ONYX MUN 2026">
    <meta property="og:description" content="View the complete list of diplomatic assignments for ONYX MUN 2026. Searchable database for all committees.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://onyxmunhyd.in/allocations">

    <!-- ItemList Schema for AEO/GEO -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "ItemList",
        "name": "ONYX MUN 2026 Committee Allocations",
        "description": "Comprehensive list of delegate and representative allocations across HCC, UNCSW, DISEC, UNHRC, and Lok Sabha committees.",
        "itemListElement": [
            {
                "@type": "ListItem",
                "position": 1,
                "name": "DISEC (50 Countries)"
            },
            {
                "@type": "ListItem",

                "name": "UNHRC (50 Countries)"
            },
            {
                "@type": "ListItem",
                "position": 3,
                "name": "Lok Sabha (60+ Representatives)"
            },
            {
                "@type": "ListItem",
                "position": 4,

            }
        ]
    }

    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --onyx: #000000;
            --surface: #0A0A0A;
            --gold: #D4AF37;
            --gold-bright: #F4CF67;
            --gold-muted: rgba(212, 175, 55, 0.15);
            --white: #FFFFFF;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --radius-lg: 32px;
            --radius-sm: 16px;
            --bezier: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--onyx);
            color: var(--white);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: clip;
            line-height: 1.6;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--onyx); }
        ::-webkit-scrollbar-thumb { 
            background: var(--gold); 
            border-radius: 10px;
        }

        /* Noise Overlay */
        .noise {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Header Section */
        header {
            padding: 100px 5% 40px;
            text-align: center;
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            position: relative;
        }

        .eyebrow {
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: block;
            animation: fadeInUp 0.8s var(--bezier);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            margin-bottom: 30px;
            background: linear-gradient(180deg, #FFFFFF 0%, rgba(255, 255, 255, 0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeInUp 1s var(--bezier);
        }

        .search-container {
            max-width: 600px;
            margin: 40px auto;
            position: relative;
            animation: fadeInUp 1.2s var(--bezier);
        }

        #allocationSearch {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 20px 25px 20px 60px;
            border-radius: 100px;
            color: var(--white);
            font-size: 1.1rem;
            backdrop-filter: blur(20px);
            transition: all 0.4s var(--bezier);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        #allocationSearch:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.15);
            transform: scale(1.02);
        }

        .search-icon {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
            opacity: 0.8;
            width: 20px;
            height: 20px;
        }

        /* Committee Navigation */
        .committee-nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 80px;
            animation: fadeInUp 1.4s var(--bezier);
        }

        .nav-chip {
            padding: 12px 25px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            color: var(--white);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            transition: all 0.3s var(--bezier);
            cursor: pointer;
            text-transform: uppercase;
        }

        .nav-chip:hover, .nav-chip.active {
            background: var(--gold);
            color: var(--onyx);
            border-color: var(--gold);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        /* Allocation Sections */
        .committee-section {
            padding: 40px 5%;
            max-width: 1400px;
            margin: 0 auto 60px;
            transition: opacity 0.5s ease;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            position: relative;
        }

        .section-header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100px; height: 2px;
            background: var(--gold);
        }

        .section-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--white);
            font-weight: 700;
        }

        .allocation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .allocation-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: var(--radius-sm);
            transition: all 0.4s var(--bezier);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .allocation-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 0;
            background: var(--gold);
            transition: height 0.4s var(--bezier);
        }

        .allocation-card:hover {
            transform: translateY(-8px) scale(1.02);
            background: rgba(212, 175, 55, 0.05);
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .allocation-card:hover::before {
            height: 100%;
        }

        .allocation-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--white);
            letter-spacing: -0.02em;
        }

        .allocation-sub {
            font-size: 0.75rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            opacity: 0.8;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px 20px;
            display: none;
        }

        .no-results p {
            font-size: 1.2rem;
            opacity: 0.5;
            letter-spacing: 1px;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            header { padding-top: 80px; }
            h1 { font-size: 3.2rem; }
            .committee-nav { gap: 8px; }
            .nav-chip { font-size: 0.75rem; padding: 10px 18px; }
            .allocation-grid { grid-template-columns: 1fr; }
        }

        /* Utility */
        .hidden { display: none !important; }
        
        /* Floating Back to Top */
        .back-to-top {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 50px;
            height: 50px;
            background: var(--gold);
            color: var(--onyx);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s var(--bezier);
            opacity: 0;
            visibility: hidden;
            border: none;
        }

        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .back-to-top:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body>
    <div class="noise"></div>

    <!-- Navigation Removed for Focus -->

    <header>
        <span class="eyebrow">The Sovereign Standard</span>
        <h1>Executive Allocations</h1>
        
        <div class="search-container">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" id="allocationSearch" placeholder="Search by name, country, or category...">
        </div>

        <div class="committee-nav">
            <button onclick="scrollToSection('hcc')" class="nav-chip">HCC</button>
            <button onclick="scrollToSection('uncsw')" class="nav-chip">UNCSW</button>
            <button onclick="scrollToSection('disec')" class="nav-chip">DISEC</button>
            <button onclick="scrollToSection('unhrc')" class="nav-chip">UNHRC</button>
            <button onclick="scrollToSection('loksabha')" class="nav-chip">Lok Sabha</button>
        </div>
    </header>

    <main id="allocationsContent">
        <!-- HCC -->
        <section id="hcc" class="committee-section">
            <div class="section-header">
                <i data-lucide="alert-circle" style="color: var(--gold)"></i>
                <h2>Human Crisis Committee</h2>
            </div>
            <div class="allocation-grid" id="hccGrid"></div>
        </section>

        <!-- UNCSW -->
        <section id="uncsw" class="committee-section">
            <div class="section-header">
                <i data-lucide="female" style="color: var(--gold)"></i>
                <h2>UNCSW</h2>
            </div>
            <div class="allocation-grid" id="uncswGrid"></div>
        </section>

        <!-- DISEC -->
        <section id="disec" class="committee-section">
            <div class="section-header">
                <i data-lucide="globe" style="color: var(--gold)"></i>
                <h2>DISEC</h2>
            </div>
            <div class="allocation-grid" id="disecGrid"></div>
        </section>

        <!-- UNHRC -->
        <section id="unhrc" class="committee-section">
            <div class="section-header">
                <i data-lucide="users" style="color: var(--gold)"></i>
                <h2>UNHRC</h2>
            </div>
            <div class="allocation-grid" id="unhrcGrid"></div>
        </section>

        <!-- Lok Sabha -->
        <section id="loksabha" class="committee-section">
            <div class="section-header">
                <i data-lucide="landmark" style="color: var(--gold)"></i>
                <h2>Lok Sabha</h2>
            </div>
            <div class="allocation-grid" id="loksabhaGrid"></div>
        </section>

        <div id="noResults" class="no-results">
            <p>High command: No matching records found in the database.</p>
        </div>
    </main>

    <button class="back-to-top" id="backToTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        <i data-lucide="arrow-up"></i>
    </button>

    <script>
        const data = {
            hcc: ["USA", "China", "Russia", "India", "UK", "France", "Germany", "Japan", "Brazil", "South Africa", "Turkey", "Saudi Arabia", "Iran", "Israel", "Egypt", "Nigeria", "Pakistan", "Indonesia", "Australia", "Canada", "Mexico", "Argentina", "Italy", "Spain", "Ukraine", "Poland", "Sweden", "Norway", "Finland", "Switzerland"],
            uncsw: ["USA", "China", "Russia", "India", "UK", "France", "Germany", "Japan", "Brazil", "South Africa", "Turkey", "Saudi Arabia", "Iran", "Israel", "Egypt", "Nigeria", "Pakistan", "Indonesia", "Australia", "Canada", "Mexico", "Argentina", "Italy", "Spain", "Ukraine", "Poland", "Sweden", "Norway", "Finland", "Switzerland"],
            disec: ["USA", "China", "Russia", "UK", "France", "India", "Pakistan", "Israel", "Iran", "North Korea", "South Korea", "Japan", "Germany", "Italy", "Canada", "Australia", "Brazil", "Argentina", "Mexico", "South Africa", "Egypt", "Saudi Arabia", "UAE", "Turkey", "Indonesia", "Malaysia", "Thailand", "Vietnam", "Philippines", "Nigeria", "Kenya", "Ethiopia", "Ukraine", "Poland", "Spain", "Netherlands", "Sweden", "Norway", "Finland", "Denmark", "Switzerland", "Austria", "Belgium", "Greece", "Portugal", "Chile", "Colombia", "Peru", "Bangladesh", "Sri Lanka"],
            unhrc: ["USA", "China", "Russia", "India", "Pakistan", "Afghanistan", "Iran", "Iraq", "Syria", "Yemen", "Israel", "Palestine", "Saudi Arabia", "UAE", "Qatar", "Turkey", "Egypt", "Sudan", "South Sudan", "Ethiopia", "Somalia", "Nigeria", "Kenya", "South Africa", "DR Congo", "France", "Germany", "UK", "Italy", "Spain", "Netherlands", "Sweden", "Norway", "Finland", "Denmark", "Poland", "Ukraine", "Canada", "Mexico", "Brazil", "Argentina", "Chile", "Colombia", "Peru", "Japan", "South Korea", "Indonesia", "Bangladesh", "Myanmar", "Sri Lanka"],
            loksabha: ["K. Chandrashekar Rao", "K. T. Rama Rao", "Narendra Modi (PM)", "Amit Shah", "Rajnath Singh", "Nitin Gadkari", "S. Jaishankar", "Piyush Goyal", "Smriti Irani", "Dharmendra Pradhan", "Ashwini Vaishnaw", "Hardeep Singh Puri", "Yogi Adityanath", "Shivraj Singh Chouhan", "Devendra Fadnavis", "Himanta Biswa Sarma", "Basavaraj Bommai", "Eknath Shinde", "Rahul Gandhi", "Sonia Gandhi", "Mallikarjun Kharge", "Shashi Tharoor", "Priyanka Gandhi", "Arvind Kejriwal", "Bhagwant Mann", "Mamata Banerjee", "Derek O’Brien", "Jagan Mohan Reddy", "N. Chandrababu Naidu", "Pawan Kalyan", "M. K. Stalin", "Udhayanidhi Stalin", "Tejashwi Yadav", "Nitish Kumar", "Lalu Prasad Yadav", "Akhilesh Yadav", "Mayawati", "Adhir Ranjan Chowdhury", "Asaduddin Owaisi", "Supriya Sule", "Sharad Pawar", "Ajit Pawar", "Omar Abdullah", "Mehbooba Mufti", "Farooq Abdullah", "Ghulam Nabi Azad", "Anurag Thakur", "Kiren Rijiju", "Prahlad Joshi", "Jyotiraditya Scindia", "A. Revanth Reddy", "G. Kishan Reddy", "T. Harish Rao", "Bandi Sanjay Kumar", "K. Kavitha", "Mallu Bhatti Vikramarka", "Nara Lokesh", "Y. S. Sharmila", "V. Vijay Sai Reddy", "Daggubati Purandeswari"]
        };

        function render() {
            lucide.createIcons();
            
            const createCard = (name, sub) => `
                <div class="allocation-card" data-search="${name.toLowerCase()} ${sub.toLowerCase()}">
                    <div class="allocation-name">${name}</div>
                    <div class="allocation-sub">${sub}</div>
                </div>
            `;

            document.getElementById('hccGrid').innerHTML = data.hcc.map(x => createCard(x, 'Country')).join('');
            document.getElementById('uncswGrid').innerHTML = data.uncsw.map(x => createCard(x, 'Country')).join('');
            document.getElementById('disecGrid').innerHTML = data.disec.map(x => createCard(x, 'Country')).join('');
            document.getElementById('unhrcGrid').innerHTML = data.unhrc.map(x => createCard(x, 'Country')).join('');
            document.getElementById('loksabhaGrid').innerHTML = data.loksabha.map(x => createCard(x, 'Leader')).join('');

            document.getElementById('allocationSearch').addEventListener('input', e => {
                const q = e.target.value.toLowerCase();
                const cards = document.querySelectorAll('.allocation-card');
                const sections = document.querySelectorAll('.committee-section');
                let found = false;

                cards.forEach(c => {
                    const match = c.dataset.search.includes(q);
                    c.classList.toggle('hidden', !match);
                    if (match) found = true;
                });

                sections.forEach(s => {
                    const hasVisible = s.querySelectorAll('.allocation-card:not(.hidden)').length > 0;
                    s.classList.toggle('hidden', !hasVisible);
                });

                document.getElementById('noResults').style.display = found ? 'none' : 'block';
            });

            window.addEventListener('scroll', () => {
                document.getElementById('backToTop').classList.toggle('visible', window.scrollY > 500);
            });
        }

        function scrollToSection(id) {
            const el = document.getElementById(id);
            const headerOffset = 20;
            const elementPosition = el.getBoundingClientRect().top;
            const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

            window.scrollTo({
                top: offsetPosition,
                behavior: "smooth"
            });
        }

        window.onload = render;
    </script>
</body>
</html>
