    <style>
        :root { --onyx: #000000; --surface: #0A0A0A; --gold: #D4AF37; --white: #FFFFFF; --glass-border: rgba(255, 255, 255, 0.1); --bezier: cubic-bezier(0.16, 1, 0.3, 1); }

        *, *::before, *::after { box-sizing: border-box; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--onyx); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; transition: background 0.3s var(--bezier); }
        ::-webkit-scrollbar-thumb:hover { background: #E5C354; }
        ::selection { background: var(--gold); color: var(--onyx); }

        /* Noise Overlay */
        .noise {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Sophisticated Loader */
        #loader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--onyx);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s var(--bezier), visibility 0.8s var(--bezier);
        }

        #loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-content {
            text-align: center;
            animation: loaderFadeIn 1s var(--bezier);
        }

        .loader-logo {
            width: 120px;
            height: auto;
            animation: logoFloat 2s ease-in-out infinite, logoPulse 3s ease-in-out infinite;
        }

        .loader-progress {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1px;
            margin: 30px auto;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), #E5C354, var(--gold));
            background-size: 200% 100%;
            animation: progressLoad 2s ease-in-out forwards, progressShine 2s linear infinite;
            border-radius: 1px;
        }

        .loader-text {
            color: var(--gold);
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 20px;
            opacity: 0.6;
            animation: textFade 2s ease-in-out infinite;
        }

        @keyframes loaderFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes logoPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        @keyframes progressLoad {
            from { width: 0%; }
            to { width: 100%; }
        }

        @keyframes progressShine {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes textFade {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Focus States */
        a:focus, button:focus, input:focus, textarea:focus, select:focus {
            outline: 2px solid var(--gold);
            outline-offset: 2px;
            transition: outline 0.2s var(--bezier);
        }

        /* Navigation */
        nav {
            padding: 30px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.4s var(--bezier);
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1600px;
            z-index: 1000;
            overflow: hidden;
        }

        nav::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.05), transparent);
            transition: left 0.6s var(--bezier);
            pointer-events: none;
        }

        nav:hover::before {
            left: 100%;
        }

        nav:hover {
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 15px 50px rgba(212, 175, 55, 0.15), 0 0 0 1px rgba(212, 175, 55, 0.1);
        }

        .nav-logo { font-family: 'Playfair Display', serif; color: var(--gold); text-decoration: none; font-weight: 700; font-size: 1.4rem; position: relative; z-index: 1; }
        .back-link { color: var(--gold); text-decoration: none; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; transition: all 0.3s var(--bezier); position: relative; z-index: 1; }

        .mobile-logo {
            display: none;
            text-align: center;
            padding: 20px 16px 0;
            width: 100%;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            padding: 150px 10% 100px;
            background: radial-gradient(ellipse at center, rgba(212, 175, 55, 0.03) 0%, transparent 70%);
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.02) 0%, transparent 50%);

        @keyframes heroGlow {

            50% { transform: translate(-5%, 10%) scale(1); }

            z-index: 1;
        }

            left: 0;

        .form-group {

            position: relative;
            z-index: 1;

        .form-group label {

            color: var(--gold);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea,

            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 18px 24px;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.3s var(--bezier);

        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }

        .form-group select option {
            background: var(--onyx);
            color: var(--white);
        }

        .submit-btn {
            width: 100%;
            background: var(--gold);
            color: var(--onyx);
            padding: 20px;
            border: none;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s var(--bezier);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s var(--bezier);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.4);
        }

        /* Position Cards */
        .positions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .position-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s var(--bezier);
            position: relative;
            overflow: hidden;
        }

        .position-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            opacity: 0;
            transition: opacity 0.3s var(--bezier);
        }

        .position-card:hover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
            transform: translateY(-4px);
        }

        .position-card:hover::before {
            opacity: 1;
        }

        .position-card.selected {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }

        .position-card.selected::before {
            opacity: 1;
        }

        .position-card h4 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            margin: 0 0 8px 0;
            color: var(--gold);
        }

        .position-card p {
            font-size: 0.85rem;
            border-color: var(--gold);
            color: var(--gold);
        }

        @media (max-width: 1024px) {
            .nav-container { top: 15px; width: 94%; }
            nav { padding: 8px 20px; }
            .nav-logo img { height: 45px; }
            section { padding-top: 140px; }
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .form-container { padding: 30px 20px; border-radius: var(--radius-sm); }
            .big-text { font-size: 4rem; }
        }

        @media (max-width: 480px) {
            .big-text { font-size: 3rem; }
        }
    </style>

        // Initialize Supabase
        const SUPABASE_URL = 'https://pmqbfmgjazlbtdtnlvez.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtcWJmbWdqYXpsYnRkdG5sdmV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NTQ5MzgsImV4cCI6MjA5MjIzMDkzOH0.XjmK1DhqyJJaTcBXso0IdkFrcK4C2f0MqxexDqzdrwQ';
        const { createClient } = window.supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Loader animation
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 2000);
        });

        // Smooth reveal animation
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);

        document.querySelectorAll('.form-container').forEach(el => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(30px)';
            el.style.transition = 'opacity 0.8s var(--bezier), transform 0.8s var(--bezier)';
            observer.observe(el);
        });

        // Form submission with Supabase
        document.getElementById('ebForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const formMessage = document.getElementById('formMessage');

            // Disable button and show loading state
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            // Collect form data
            const formData = {

                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                institution: document.getElementById('institution').value,
                position: document.getElementById('position').value,
                mun_experience: document.getElementById('munExperience').value,
                leadership_experience: document.getElementById('leadershipExperience').value,
                motivation: document.getElementById('motivation').value,
                additional_info: document.getElementById('additionalInfo').value,
                referral_source: document.getElementById('referralSource').value,
                queries_feedback: document.getElementById('queriesFeedback').value,
                submitted_at: new Date().toISOString()
            };

            try {
                // Submit to Supabase
                const { data, error } = await supabaseClient
                    .from('eb_applications')
                    .insert([formData])
                    .select();

                if (error) throw error;

                // Success message
                formMessage.textContent = 'Application submitted successfully! We will contact you soon.';
                formMessage.style.color = '#D4AF37';
                formMessage.style.opacity = '1';

                // Reset form
                document.getElementById('ebForm').reset();

            } catch (error) {
                console.error('Error submitting form:', error);
                formMessage.textContent = 'Error submitting application. Please try again or contact us directly.';
                formMessage.style.color = '#ff4444';
                formMessage.style.opacity = '1';
            } finally {
                // Re-enable button
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Application';
            }
        });
    </script>
</body>
</html>
